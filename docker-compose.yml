services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: corelab
      POSTGRES_PASSWORD: corelab
      POSTGRES_DB: corelab
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr INTERNAL://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr INTERNAL://redpanda:29092,OUTSIDE://localhost:9092
    ports: ["9092:9092"]

  console:
    image: redpandadata/console:latest
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports: ["8080:8080"]
    depends_on: [redpanda]

volumes:
  pgdata:
